use_wandb: False
use_sky: False
use_dynamic: False
use_loop: False
use_pose_refine: False
use_metric: False
mode: 'vo'

device:
  tracker: 'cuda:0'
  mapper: 'cuda:0'

dataset:
  root: /Users/krushna/Downloads/vicon_room1
  module: datasets.euroc
  rgb_strip: 1

middleware:
  cov_times: 100
  max_cov: 1e4
  max_depth: 6

output:
  save_dir: /Users/krushna/Downloads/vings_output/

# TUM-VI vicon_room1 — cam0 fisheye pre-rectified to 512x512
# fu=fv (square pixels), cu=cy, cv=cx per VINGS-Mono convention
intrinsic:
  H: 512
  W: 512
  fu: 190.978
  fv: 190.973
  cu: 256.897   # cy
  cv: 254.932   # cx

frontend:
  weight: /Users/krushna/Downloads/VINGS-Mono/ckpts/droid.pth   # adjust path
  image_size: [384, 512]
  buffer: 80
  filter_thresh: 2.4
  c2i: None
  warm_up: 8
  beta: 0.3
  frontend_nms: 1
  keyframe_thresh: 4.0
  frontend_window: 5
  frontend_thresh: 4.0
  frontend_radius: 2
  active_window: 12
  max_factors: 48
  far_threshold: 0.02
  inac_range: 3
  mask_threshold: -1.0
  skip_edge: [-4,-5,-6]
  translation_threshold: 0.3
  show_plot: False

adc_args:
  accum_thresh: 0.98

training_args:
  num_keyframe: 8
  iters: 50
  lr:
    _xyz_lr: 0.00002
    _rgb_lr: 0.0001
    _opacity_lr: 0.02
    _scaling_lr: 0.001
    _rotation_lr: 0.001
  loss_weights:
    rgb_loss: 1.0
    depth_loss: 1.0
    alpha_loss: 0.5
    normal_loss: 0.05
    dist_loss: 0.0
    smooth_loss: 0.0

use_vis: False
use_storage_manager: False

looper:
  lightglue_weight_dir: /Users/krushna/Downloads/VINGS-Mono/ckpts/lightglue/
  onnx_w: 512
  H: 384
  W: 512
  loop_radius: 15
  is_loop_min_match_num: 45
  search_num: 30
  is_loop_mse_threshold: 0.15
  is_loop_med_times: 100.0